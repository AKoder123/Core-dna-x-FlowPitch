<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FlowPitch × Core dna</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- TOP NAV -->
  <nav id="topNav">

        <span id="slideCounter">1</span>&nbsp;/&nbsp;<span id="slideTotal">—</span>
